name: Keep Supabase Alive

# Runs once a day to (1) keep the Supabase project from pausing on the
# free plan, and (2) delete help requests older than 30 days.
#
# Required GitHub repository secrets (Settings > Secrets and variables > Actions):
#   SUPABASE_URL        e.g. https://xxxx.supabase.co
#   SUPABASE_ANON_KEY   the project's anon/public key
#   CRON_SECRET         the same value set in the Supabase Edge Function secrets

on:
  schedule:
    # 00:00 UTC every day (= 09:00 JST). Adjust as you like.
    - cron: '0 0 * * *'
  workflow_dispatch:   # allow manual runs from the Actions tab

jobs:
  ping:
    runs-on: ubuntu-latest
    steps:
      - name: Ping Supabase (keep project awake)
        run: |
          curl -s -o /dev/null -w "ping: %{http_code}\n" \
            -H "apikey: ${{ secrets.SUPABASE_ANON_KEY }}" \
            -H "Authorization: Bearer ${{ secrets.SUPABASE_ANON_KEY }}" \
            "${{ secrets.SUPABASE_URL }}/rest/v1/hq?select=id&limit=1"

      - name: Cleanup old requests (older than 30 days)
        run: |
          curl -s -w "cleanup: %{http_code}\n" \
            -X POST \
            -H "Content-Type: application/json" \
            -H "Authorization: Bearer ${{ secrets.SUPABASE_ANON_KEY }}" \
            -H "x-cron-secret: ${{ secrets.CRON_SECRET }}" \
            "${{ secrets.SUPABASE_URL }}/functions/v1/cleanup-old-requests"
