name: Keep Supabase Alive

# Runs (1) a keep-alive ping so the Supabase project doesn't pause on the
# free plan, and (2) a cleanup of help requests older than 30 days.
#
# ----------------------------------------------------------------------
# IMPORTANT: The daily schedule is DISABLED by default.
#
# Out of the box this workflow only runs when you trigger it manually
# (Actions tab > "Keep Supabase Alive" > "Run workflow"). This prevents
# failing runs (and failure emails) before you have finished setup.
#
# To enable the daily automatic run AFTER you have set the repository
# secrets below, simply uncomment the two "schedule:" lines further down.
# ----------------------------------------------------------------------
#
# Required GitHub repository secrets (Settings > Secrets and variables > Actions):
#   SUPABASE_URL        e.g. https://xxxx.supabase.co
#   SUPABASE_ANON_KEY   the project's anon/public key
#   CRON_SECRET         the same value set in the Supabase Edge Function secrets

on:
  # --- Daily automatic run (DISABLED by default) ---
  # Uncomment the next two lines after you have configured the secrets
  # above, to run this every day at 00:00 UTC (= 09:00 JST).
  # schedule:
  #   - cron: '0 0 * * *'

  # Manual run from the Actions tab (always available).
  workflow_dispatch:

jobs:
  ping:
    runs-on: ubuntu-latest
    steps:
      - name: Ping Supabase (keep project awake)
        run: |
          curl -s -o /dev/null -w "ping: %{http_code}\n" \
            -H "apikey: ${{ secrets.SUPABASE_ANON_KEY }}" \
            -H "Authorization: Bearer ${{ secrets.SUPABASE_ANON_KEY }}" \
            "${{ secrets.SUPABASE_URL }}/rest/v1/hq?select=id&limit=1"

      - name: Cleanup old requests (older than 30 days)
        run: |
          curl -s -w "cleanup: %{http_code}\n" \
            -X POST \
            -H "Content-Type: application/json" \
            -H "Authorization: Bearer ${{ secrets.SUPABASE_ANON_KEY }}" \
            -H "x-cron-secret: ${{ secrets.CRON_SECRET }}" \
            "${{ secrets.SUPABASE_URL }}/functions/v1/cleanup-old-requests"
